services:
  ui:
    build:
      context: ./src/ui
      dockerfile: ../../images/java17/Dockerfile
      args:
        JAR_PATH: target/ui-0.0.1-SNAPSHOT.jar
    image: retail-store-ui:local
    container_name: ui
    ports:
      - "8888:8080"
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom"
      SERVER_TOMCAT_ACCESSLOG_ENABLED: "true"
      ENDPOINTS_CATALOG: "http://catalog:8080"
      ENDPOINTS_CARTS: "http://carts:8080"
      ENDPOINTS_ORDERS: "http://orders:8080"
      ENDPOINTS_CHECKOUT: "http://checkout:8080"
      ENDPOINTS_ASSETS: "http://assets:8080"
      ENDPOINTS_HTTP_KEEPALIVE: "true"
    depends_on:
      - catalog
      - carts
      - orders
      - checkout
      - assets
    networks:
      - ui
      - catalog
      - carts
      - orders
      - checkout
      - assets

  catalog:
    build:
      context: ./src/catalog
      dockerfile: ../../images/go/Dockerfile
      args:
        MAIN_PATH: main.go
    image: retail-store-catalog:local
    container_name: catalog
    environment:
      GIN_MODE: "release"
      DB_ENDPOINT: "catalog-db:3306"
      DB_NAME: "sampledb"
      DB_USER: "catalog_user"
      DB_PASSWORD: "${MYSQL_PASSWORD:-store-local-pass}"
      DB_MIGRATE: "true"
    depends_on:
      catalog-db:
        condition: service_healthy
    networks:
      - catalog
      - catalog-db

  catalog-db:
    image: mariadb:10.9
    container_name: catalog-db
    environment:
      MARIADB_ROOT_PASSWORD: "${MYSQL_PASSWORD:-store-local-pass}"
      MARIADB_DATABASE: "sampledb"
      MARIADB_USER: "catalog_user"
      MARIADB_PASSWORD: "${MYSQL_PASSWORD:-store-local-pass}"
    volumes:
      - catalog-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -p\"$$MARIADB_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - catalog-db

  carts:
    build:
      context: ./src/cart
      dockerfile: ../../images/java17/Dockerfile
      args:
        JAR_PATH: target/carts-0.0.1-SNAPSHOT.jar
    image: retail-store-carts:local
    container_name: carts
    environment:
      AWS_ACCESS_KEY_ID: "dummy"
      AWS_SECRET_ACCESS_KEY: "dummy"
      AWS_REGION: "us-east-1"
      CARTS_DYNAMODB_ENDPOINT: "http://carts-db:8000"
      CARTS_DYNAMODB_CREATETABLE: "true"
      SPRING_PROFILES_ACTIVE: "dynamodb"
    depends_on:
      - carts-db
    networks:
      - carts
      - carts-db

  carts-db:
    image: amazon/dynamodb-local:1.20.0
    container_name: carts-db
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    networks:
      - carts-db

  orders:
    build:
      context: ./src/orders
      dockerfile: ../../images/java17/Dockerfile
      args:
        JAR_PATH: target/orders-0.0.1-SNAPSHOT.jar
    image: retail-store-orders:local
    container_name: orders
    environment:
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom"
      SERVER_TOMCAT_ACCESSLOG_ENABLED: "true"
      SPRING_PROFILES_ACTIVE: "mysql,rabbitmq"
      SPRING_DATASOURCE_WRITER_URL: "jdbc:mariadb://orders-db:3306/orders"
      SPRING_DATASOURCE_WRITER_USERNAME: "orders_user"
      SPRING_DATASOURCE_WRITER_PASSWORD: "${MYSQL_PASSWORD:-store-local-pass}"
      SPRING_DATASOURCE_READER_URL: "jdbc:mariadb://orders-db:3306/orders"
      SPRING_DATASOURCE_READER_USERNAME: "orders_user"
      SPRING_DATASOURCE_READER_PASSWORD: "${MYSQL_PASSWORD:-store-local-pass}"
      SPRING_RABBITMQ_HOST: "rabbitmq"
    depends_on:
      orders-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - orders
      - orders-db
      - rabbitmq

  orders-db:
    image: mariadb:10.9
    container_name: orders-db
    environment:
      MARIADB_ROOT_PASSWORD: "${MYSQL_PASSWORD:-store-local-pass}"
      MARIADB_DATABASE: "orders"
      MARIADB_USER: "orders_user"
      MARIADB_PASSWORD: "${MYSQL_PASSWORD:-store-local-pass}"
    volumes:
      - orders-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -p\"$$MARIADB_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - orders-db

  checkout:
    build:
      context: ./src/checkout
      dockerfile: ../../images/nodejs/Dockerfile
    image: retail-store-checkout:local
    container_name: checkout
    environment:
      REDIS_URL: "redis://checkout-redis:6379"
      ENDPOINTS_ORDERS: "http://orders:8080"
    depends_on:
      - checkout-redis
      - orders
      - carts
      - catalog
      - rabbitmq
    networks:
      - checkout
      - checkout-redis
      - orders
      - carts
      - catalog
      - rabbitmq

  checkout-redis:
    image: redis:6-alpine
    container_name: checkout-redis
    networks:
      - checkout-redis

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rabbitmq

  assets:
    build:
      context: ./src/assets
      dockerfile: Dockerfile
    image: retail-store-assets:local
    container_name: assets
    networks:
      - assets

volumes:
  catalog-db-data:
  orders-db-data:

networks:
  ui:
  catalog:
  carts:
  orders:
  checkout:
  assets:
  catalog-db:
  orders-db:
  carts-db:
  checkout-redis:
  rabbitmq:
